<!-- padre.component.html -->
<h3>Contatore (Padre): {{ contatore }}</h3>
<!-- Passiamo il valore contatore al componente figlio e ascoltiamo l'evento
countChange -->
<app-figlio [count]="contatore" (countChange)="onConteggioCambiato($event)"></app-figlio>

<!-- Signals -->
<h3>Contatore Signal (Padre): {{ counterSignal() }}</h3>
<app-figlio [countSignal]="counterSignal()" (countChangeSignal)="onConteggioCambiato($event)"></app-figlio>
